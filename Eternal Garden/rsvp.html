</div>

<div class="step active" data-step="2"><span class="dot"></span><span class="step-label">RSVP</span></div>
</div>
<button class="material-symbols-outlined text-stone-400" data-icon="menu_book">menu_book</button>
</nav>
<main class="relative pt-32 pb-40">
<div class="container mx-auto px-6 md:px-12 relative z-10">
<!-- Back Button -->

<a href="index.html" data-slide="index.html" data-direction="right" class="btn-feedback inline-flex items-center gap-2 font-label-lg text-primary hover:text-primary-fixed-dim transition-colors duration-300">

</a>
</section>
<!-- RSVP Hero Section -->
<section class="premium-section max-w-4xl mx-auto text-center mb-16">
<span class="font-label-lg text-primary uppercase mb-4 block tracking-[0.2em]">The Honor of Your Presence</span>
<h1 class="font-display-lg text-on-surface mb-8">Confirm Your Bloom</h1>
  <div class="vows-countdown flex justify-center gap-6 my-8"></div>
<div class="glass-card rounded-[2.5rem] p-8 md:p-16 petal-glow relative overflow-hidden group text-left">
<div class="absolute top-0 right-0 p-4 opacity-20 group-hover:opacity-40 transition-opacity duration-700">
<svg class="text-tertiary" fill="none" height="120" viewbox="0 0 100 100" width="120"><path d="M50 10C50 10 55 30 75 30C95 30 90 50 70 50C50 50 50 90 50 90C50 90 50 50 30 50C10 50 5 30 25 30C45 30 50 10 50 10Z" stroke="currentColor" stroke-width="0.5"></path></svg>

<form class="space-y-10">
<div class="grid grid-cols-1 md:grid-cols-2 gap-10">
<div class="relative group/input">
<label class="font-label-md text-outline absolute -top-6 left-0 transition-all group-focus-within/input:text-primary">Guest Full Name</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant focus:ring-0 focus:border-primary py-3 px-0 font-body-lg text-on-surface placeholder-stone-300 transition-colors" placeholder="e.g. Julianne Sterling" type="text"/>
<div class="absolute bottom-0 left-0 w-0 h-[2px] bg-primary group-focus-within/input:w-full transition-all duration-500"></div>
</div>
<div class="relative group/input">
<label class="font-label-md text-outline absolute -top-6 left-0 transition-all group-focus-within/input:text-primary">Email Address</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant focus:ring-0 focus:border-primary py-3 px-0 font-body-lg text-on-surface placeholder-stone-300 transition-colors" placeholder="hello@sterling.com" type="email"/>
<div class="absolute bottom-0 left-0 w-0 h-[2px] bg-primary group-focus-within/input:w-full transition-all duration-500"></div>
</div>
</div>
<div class="relative group/input">
<label class="font-label-md text-outline absolute -top-6 left-0 transition-all group-focus-within/input:text-primary">Number of Guests</label>
<select class="w-full bg-transparent border-0 border-b border-outline-variant focus:ring-0 focus:border-primary py-3 px-0 font-body-lg text-on-surface transition-colors">
<option value="1">1 Guest</option>
<option value="2">2 Guests</option>
<option value="3">3 Guests</option>
<option value="4">4 Guests</option>
<option value="5">5 Guests</option>
</select>
<div class="absolute bottom-0 left-0 w-0 h-[2px] bg-primary group-focus-within/input:w-full transition-all duration-500"></div>
</div>
<div class="relative group/input">
<label class="font-label-md text-outline absolute -top-6 left-0">Dietary Requirements</label>
<textarea class="w-full bg-transparent border-0 border-b border-outline-variant focus:ring-0 focus:border-primary py-3 px-0 font-body-lg text-on-surface placeholder-stone-300 resize-none transition-colors" placeholder="Tell us if you need vegan petals..." rows="2"></textarea>
</div>
<div class="relative group/input">
<label class="font-label-md text-outline absolute -top-6 left-0">Message for the Couple</label>
<textarea class="w-full bg-transparent border-0 border-b border-outline-variant focus:ring-0 focus:border-primary py-3 px-0 font-body-lg text-on-surface placeholder-stone-300 resize-none transition-colors" placeholder="Write your well wishes..." rows="3"></textarea>
</div>
<div class="text-center pt-8">
<button type="submit" class="btn-feedback bg-gradient-to-r from-secondary-fixed-dim to-secondary-container text-on-secondary px-12 py-5 rounded-full font-label-lg tracking-widest shadow-lg shadow-secondary-fixed/30 hover:scale-105 active:scale-95 transition-all duration-500 ease-out-cubic">SEND RESPONSE</button>
</div>

</div>
