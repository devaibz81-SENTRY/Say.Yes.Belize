<body class="bg-surface font-body-md text-on-surface overflow-x-hidden selection:bg-primary-container selection:text-on-primary-container">
<!-- Top Navigation -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 py-4 bg-[#FFF9F0]/70 backdrop-blur-md border-b border-amber-200/30 shadow-[0_4px_20px_rgba(253,226,228,0.2)]">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-amber-700" data-icon="local_florist">local_florist</span>
<span class="font-serif italic text-2xl text-amber-700">Eternal Garden</span>
</div>
<nav class="hidden md:flex gap-8 items-center">
<a class="font-serif tracking-widest uppercase text-stone-400 hover:opacity-80 transition-opacity duration-500" href="#">Our Story</a>
<a class="font-serif tracking-widest uppercase text-amber-800 transition-opacity duration-500" href="#">RSVP</a>
<a class="font-serif tracking-widest uppercase text-stone-400 hover:opacity-80 transition-opacity duration-500" href="#">Registry</a>
</nav>
<button class="material-symbols-outlined text-stone-400" data-icon="menu_book">menu_book</button>
</header>
<main class="relative pt-32 pb-40">
<!-- Floating Floral Elements -->
<div class="fixed inset-0 pointer-events-none overflow-hidden z-0 opacity-40">
<div class="absolute top-[10%] -left-20 w-96 h-96 blur-3xl bg-primary-container/30 rounded-full animate-pulse"></div>
<div class="absolute bottom-[20%] -right-20 w-[30rem] h-[30rem] blur-3xl bg-tertiary-container/20 rounded-full"></div>
</div>
<div class="container mx-auto px-margin-mobile md:px-margin-desktop relative z-10">
<!-- RSVP Hero Section -->
<section class="max-w-4xl mx-auto text-center mb-section-gap">
<span class="font-label-lg text-primary uppercase mb-4 block tracking-[0.2em]">The Honor of Your Presence</span>
<h1 class="font-display-lg text-on-surface mb-8">Confirm Your Bloom</h1>
<div class="vows-countdown"></div>
<!-- Floating RSVP Card -->
<div class="glass-card rounded-[2.5rem] p-8 md:p-16 petal-glow relative overflow-hidden group">
<!-- Ornamental SVG -->
<div class="absolute top-0 right-0 p-4 opacity-20 group-hover:opacity-40 transition-opacity duration-700">
<svg class="text-tertiary" fill="none" height="120" viewbox="0 0 100 100" width="120">
<path d="M50 10C50 10 55 30 75 30C95 30 90 50 70 50C50 50 50 90 50 90C50 90 50 50 30 50C10 50 5 30 25 30C45 30 50 10 50 10Z" stroke="currentColor" stroke-width="0.5"></path>
</svg>
</div>
<form class="space-y-12 text-left">
<div class="grid grid-cols-1 md:grid-cols-2 gap-12">
<div class="relative group/input">
<label class="font-label-md text-outline absolute -top-6 left-0 transition-all group-focus-within/input:text-primary">Guest Full Name</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant focus:ring-0 focus:border-primary py-3 px-0 font-body-lg text-on-surface placeholder-stone-300 transition-colors" placeholder="e.g. Julianne Sterling" type="text"/>
<div class="absolute bottom-0 left-0 w-0 h-[2px] bg-primary group-focus-within/input:w-full transition-all duration-500"></div>
</div>
<div class="relative group/input">
<label class="font-label-md text-outline absolute -top-6 left-0 transition-all group-focus-within/input:text-primary">Email Address</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant focus:ring-0 focus:border-primary py-3 px-0 font-body-lg text-on-surface placeholder-stone-300 transition-colors" placeholder="hello@sterling.com" type="email"/>
<div class="absolute bottom-0 left-0 w-0 h-[2px] bg-primary group-focus-within/input:w-full transition-all duration-500"></div>
</div>
</div>
<div class="space-y-6">
<p class="font-label-lg text-on-surface-variant mb-4">Will you be attending our secret garden union?</p>
<div class="flex flex-wrap gap-6">
<label class="flex items-center gap-4 cursor-pointer group/radio">
<div class="w-6 h-6 rounded-full border border-outline flex items-center justify-center group-hover/radio:border-primary transition-colors">
<input class="appearance-none w-3 h-3 rounded-full checked:bg-primary border-none" name="attendance" type="radio"/>
</div>
<span class="font-body-md">Delighted to Attend</span>
</label>
<label class="flex items-center gap-4 cursor-pointer group/radio">
<div class="w-6 h-6 rounded-full border border-outline flex items-center justify-center group-hover/radio:border-primary transition-colors">
<input class="appearance-none w-3 h-3 rounded-full checked:bg-primary border-none" name="attendance" type="radio"/>
</div>
<span class="font-body-md">Regretfully Decline</span>
</label>
</div>
</div>
<div class="relative group/input">
<label class="font-label-md text-outline absolute -top-6 left-0">Dietary Preferences &amp; Well Wishes</label>
<textarea class="w-full bg-transparent border-0 border-b border-outline-variant focus:ring-0 focus:border-primary py-3 px-0 font-body-lg text-on-surface placeholder-stone-300 resize-none transition-colors" placeholder="Tell us if you need vegan petals..." rows="2"></textarea>
</div>
<div class="text-center pt-8">
<button class="bg-gradient-to-r from-secondary-fixed-dim to-secondary-container text-on-secondary px-12 py-5 rounded-full font-label-lg tracking-widest shadow-lg shadow-secondary-fixed/30 hover:scale-105 active:scale-95 transition-all duration-500 ease-out-cubic">
                                SEND RESPONSE
                            </button>
</div>
</form>
</div>

</div>
</div>

</div>
</div>

<div class="col-span-12 md:col-span-8 relative md:mt-8">
<div class="glass-card p-4 rounded-3xl group hover:translate-y-[-8px] transition-transform duration-700">
<img alt="Estate Garden" class="w-full aspect-[16/9] object-cover rounded-2xl" data-alt="A panoramic landscape of a misty, manicured estate garden at dawn featuring a classical marble gazebo and stone pathways. The colors are dominated by soft ivory morning fog and deep sage foliage with hints of pale blush roses. The mood is tranquil, timeless, and sophisticated, embodying a minimalist luxury garden aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC5IgcqzvD0CIyBf1P3sd_kFiLURR0gyKVPWb60wE_XzgvzcYN5JEkvLe7IVItMg2LiyDvMgDDlS7AC4FkQBnEgwsHALsLGhyZ5-VrsGYkxxD7HJ36lcTCb9rLVkGHfuWLc0vNiGuUKsZR9XCTiG4_f7Sk0-3VZRW5kEq8Yk02lXvVn-aZyKNwqqg43kd52TqpYEUD0IBJMH6deyM71sz8Jpt4N2ODcq2_yEz-p2iFhn7T8KBFBT2AEHnoqzqMBGt6EZSIG1nB5EknN"/>
</div>
</div>
</div>
</section>
</div>

<a class="flex flex-col items-center justify-center text-stone-500 opacity-60 hover:scale-105 transition-transform duration-500" href="#">
<span class="material-symbols-outlined mb-1" data-icon="favorite">favorite</span>
<span class="font-serif text-[10px] tracking-tight">Invite</span>
</a>
<a class="flex flex-col items-center justify-center text-stone-500 opacity-60 hover:scale-105 transition-transform duration-500" href="#">
<span class="material-symbols-outlined mb-1" data-icon="auto_stories">auto_stories</span>
<span class="font-serif text-[10px] tracking-tight">Our Story</span>

<a class="flex flex-col items-center justify-center text-amber-800 bg-[#FDE2E4]/40 rounded-full px-4 py-1 animate-pulse-slow" href="#">

<span class="material-symbols-outlined mb-1" data-icon="card_giftcard">card_giftcard</span>
