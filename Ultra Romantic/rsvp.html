<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .satin-button {
            background: linear-gradient(135deg, #F5E6E8 0%, #F1E9DA 100%);
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.8), 0 4px 15px rgba(212,175,55,0.15);
        }
        .floral-overlay {
            mix-blend-mode: multiply;
            pointer-events: none;
        }
        .sparkle-bg {
            background-image: radial-gradient(circle at center, #D4AF37 1px, transparent 1px);
            background-size: 24px 24px;
            opacity: 0.05;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

    <link href="../fonts.css" rel="stylesheet"/>
  <link href="../premium.css" rel="stylesheet"/>
</head>
<body class="bg-background font-body-md text-on-background min-h-screen relative overflow-x-hidden">
<!-- Top Navigation Shell -->
<header class="bg-[#F5E6E8]/70 backdrop-blur-xl border-b border-white/40 shadow-[0_8px_32px_0_rgba(242,210,217,0.3)] sticky top-0 z-[100] flex justify-between items-center w-full px-6 h-16">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#D4AF37]" data-icon="auto_awesome">auto_awesome</span>
<h1 class="text-xl font-serif italic text-rose-800 dark:text-rose-200">Evelyn &amp; Julian</h1>
</div>
<div class="hidden md:flex gap-8 items-center">
<a class="font-serif text-rose-400 dark:text-rose-300 hover:opacity-80 transition-opacity" href="#">Our Story</a>
<a class="font-serif text-rose-400 dark:text-rose-300 hover:opacity-80 transition-opacity" href="#">Ceremony</a>
<a class="font-serif text-rose-400 dark:text-rose-300 hover:opacity-80 transition-opacity" href="#">Registry</a>
<a class="font-serif italic text-rose-900 dark:text-rose-100 font-semibold border-b-2 border-[#D4AF37]" href="#">RSVP</a>
</div>
<span class="material-symbols-outlined text-[#D4AF37]" data-icon="favorite">favorite</span>
</header>
<!-- Main Canvas -->
<main class="relative pt-section-gap pb-32 px-container-padding flex justify-center items-center">
<!-- Background Floral Elements -->
<div class="absolute top-0 left-0 w-64 h-64 opacity-30 floral-overlay -translate-x-1/4 -translate-y-1/4 rotate-12">
<img class="w-full h-full object-contain" data-alt="A delicate, ethereal close-up of soft pink peony petals and white cherry blossoms with a soft focus background. The lighting is warm and natural, mimicking a sun-drenched garden in the early morning. The overall aesthetic is ultra-feminine, romantic, and dreamy, perfectly matching a high-end wedding theme with a soft color palette of blush and ivory." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBtByhIbr1pX7FbtUPmge-OLnLQQ_eCmsSAFvHE2TXePjJpfHwR4tciU0k7-08By45DpaxGgwcU8fBlcBSzNs_I7tJk2ru_ksxpEA5_3bdLqMf5OR-JNPT9n0xG6xZDw71bmBnBlNmxR_3_9HC4usjJhmOVDqUTUwVNQdf_moqBrR_xWvC7OrpaEibly_YFBcRXvAsEw8iOuApz960I12WL3w_ER3uknwryM7_Q2HbDoQO0NUo-G427maNrCijPxe296la0kQdPWPgA"/>
</div>
<div class="absolute bottom-0 right-0 w-80 h-80 opacity-25 floral-overlay translate-x-1/4 translate-y-1/4 -rotate-12">
<img class="w-full h-full object-contain" data-alt="Intricate digital illustration of vintage golden botanical vines and delicate white roses blooming across a pristine ivory surface. The lighting is ethereal and soft, highlighting the translucent quality of the petals. The design is elegant and timeless, following a sophisticated wedding aesthetic with subtle gold highlights and airy compositions." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDS7CIQfVn8b2t15JXsyhNpcxdT1gKGAAETp6Ye88H5ibdaCl05W7EIJ692euFaoO-cwt3vcDgOpX-QTaah6Sr7qZ1Al1p_5nsJew_tAIXrCiYS-rXWaSehoHZt3EkrdolJst3buFHP1kWKtrXlk8lfPs72FhmlD7WHj0nSZE0i-CHwxq1RFv40tnSDkv1bYFxmXKM3Yi-xEQQTHq15L0yxmO9DEHDwJ_lj_tKX8_SAGoWWWNg2hzhNusR7a_Hw-nO7RI-jOb_jkB8Q"/>
</div>
<!-- RSVP Card Container -->
<section class="max-w-[600px] w-full relative">
<!-- The Card Shadow/Glow -->
<div class="absolute inset-0 bg-[#D4AF37] opacity-10 blur-[40px] rounded-[2rem]"></div>
<!-- The Physical Card -->
<div class="glass-card relative z-10 p-10 md:p-16 rounded-[2rem] shadow-[0_20px_50px_rgba(212,175,55,0.1)] overflow-hidden border border-white/60">
<div class="sparkle-bg absolute inset-0"></div>
<!-- Card Header -->
<div class="text-center mb-12">
<span class="font-script-accent text-script-accent italic text-secondary mb-2 block">Kindly Respond</span>
<h2 class="font-headline-xl text-headline-xl text-primary leading-tight">RSVP</h2>
<div class="w-16 h-[1px] bg-[#D4AF37] mx-auto mt-6 opacity-40"></div>
</div>
<div class="vows-countdown"></div>
<!-- Form -->
<form action="#" class="space-y-10 relative">
<!-- Guest Name -->
<div class="relative group">
<label class="block font-headline-md text-headline-md text-primary/60 mb-2 italic transition-all group-focus-within:text-primary" for="name">Guest Name</label>
<input class="w-full bg-transparent border-t-0 border-x-0 border-b border-secondary/30 focus:border-secondary focus:ring-0 text-headline-md font-script-accent italic py-3 transition-colors placeholder:opacity-20" id="name" name="name" placeholder="M. Julian Evelyn" type="text"/>
</div>
<!-- Attendance -->
<div class="space-y-6">
<p class="font-label-sm text-label-sm text-outline tracking-[0.2em] uppercase text-center">Will you be attending?</p>
<div class="flex flex-col md:flex-row justify-center gap-gutter">
<label class="flex items-center gap-3 cursor-pointer group">
<div class="relative flex items-center justify-center">
<input class="peer appearance-none w-6 h-6 border border-[#D4AF37] rounded-full checked:bg-primary-container transition-all" name="attendance" type="radio" value="yes"/>
<div class="absolute w-3 h-3 bg-secondary rounded-full scale-0 peer-checked:scale-100 transition-transform"></div>
</div>
<span class="font-headline-md text-headline-md italic text-primary/70 group-hover:text-primary">Accepts with Pleasure</span>
</label>
<label class="flex items-center gap-3 cursor-pointer group">
<div class="relative flex items-center justify-center">
<input class="peer appearance-none w-6 h-6 border border-[#D4AF37] rounded-full checked:bg-primary-container transition-all" name="attendance" type="radio" value="no"/>
<div class="absolute w-3 h-3 bg-secondary rounded-full scale-0 peer-checked:scale-100 transition-transform"></div>
</div>
<span class="font-headline-md text-headline-md italic text-primary/70 group-hover:text-primary">Declines with Regret</span>
</label>
</div>
</div>
<!-- Meal Preference -->
<div class="relative group">
<label class="block font-headline-md text-headline-md text-primary/60 mb-2 italic transition-all group-focus-within:text-primary" for="diet">Dietary Notes</label>
<input class="w-full bg-transparent border-t-0 border-x-0 border-b border-secondary/30 focus:border-secondary focus:ring-0 text-body-lg py-3 transition-colors placeholder:opacity-30" id="diet" name="diet" placeholder="e.g. Vegetarian, Gluten Free" type="text"/>
</div>
<!-- Submit Button -->
<div class="pt-8 text-center">
<button class="satin-button group relative px-12 py-5 rounded-full border border-[#D4AF37]/30 overflow-hidden transition-all active:scale-95 duration-300 ease-out" type="submit">
<span class="relative z-10 font-label-sm text-label-sm text-rose-900 tracking-widest uppercase">Send RSVP</span>
<div class="absolute inset-0 bg-white/20 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700 ease-in-out"></div>
</button>
<p class="mt-6 font-label-sm text-label-sm text-outline italic">Please reply by August 15th, 2024</p>
</div>
</form>
<!-- Corner Accent -->
<div class="absolute -bottom-6 -right-6 w-32 h-32 opacity-40 floral-overlay">
<img class="w-full h-full object-cover rounded-full" data-alt="Close up of a luxury wedding invitation's embossed gold foil detail. The camera captures the texture of premium heavy-weight cotton paper with a subtle grain. Soft, warm lighting creates gentle shadows, emphasizing the craftsmanship and elegance of the physical card. The mood is intimate, celebratory, and highly sophisticated." src="https://lh3.googleusercontent.com/aida-public/AB6AXuD6mR7IrK4LPd5p0z-EdZg5uGg2atxmsmT_7p4fG8TEEQOOC5hDZMkT5lyiUyJT28gBbBHwyBiT1ex6ZtSRd4dBMK4POtf7STFmUIlO9XKOBkjbCDa0dctgMssOZ-bAVrym6y9xZy_Vv6HMZDZEWzWNGzGZHHeI4aGGJWYSwVkwANAF4F9cbD8Hbks4uT8h5SDjua20ZQcMZC9S0SxH6t7SROCGd_ZYD6fA-z1V5v47-ZEG-42HHgfcITm1RBSgPJnb-TZp0JzfDc2E"/>
</div>
</div>
</section>
</main>
<!-- Bottom Navigation Shell (Mobile Only) -->
<nav class="md:hidden fixed bottom-0 left-0 w-full bg-white/60 backdrop-blur-2xl z-50 rounded-t-3xl border-t border-white/50 shadow-[0_-10px_40px_rgba(212,175,55,0.12)] flex justify-around items-center px-4 pt-3 pb-6">
<a class="flex flex-col items-center justify-center text-rose-300 dark:text-rose-400 opacity-60 hover:text-rose-600 transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="history_edu">history_edu</span>
<span class="font-serif text-[10px] uppercase tracking-widest">Our Story</span>
</a>
<a class="flex flex-col items-center justify-center text-rose-300 dark:text-rose-400 opacity-60 hover:text-rose-600 transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="church">church</span>
<span class="font-serif text-[10px] uppercase tracking-widest">Ceremony</span>
</a>
<a class="flex flex-col items-center justify-center text-rose-300 dark:text-rose-400 opacity-60 hover:text-rose-600 transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="card_giftcard">card_giftcard</span>
<span class="font-serif text-[10px] uppercase tracking-widest">Registry</span>
</a>
<a class="flex flex-col items-center justify-center text-rose-900 dark:text-rose-100 scale-110 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="auto_stories" data-weight="fill">auto_stories</span>
<span class="font-serif text-[10px] uppercase tracking-widest">RSVP</span>
</a>
</nav>

<!-- Core Interactive Systems -->
<script src="../guided-tour.js"></script>
<script src="../photo-uploader.js"></script>
<script src="../editable-fields.js"></script>
<script src="../interactive-template-init.js"></script>

<!-- Ultra Romantic Template Initialization -->
<script src="ultra-romantic-init.js"></script>
<script src="../countdown-widget.js"></script>

<script src="../mobile-optimize.js"></script>
  <script src="../font-picker.js"></script>
  <script src="../premium.js"></script>
</body></html>
