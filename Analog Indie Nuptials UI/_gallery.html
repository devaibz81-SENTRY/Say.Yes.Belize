<script>
const io=new IntersectionObserver(e=>e.forEach(x=>{if(x.isIntersecting){x.target.classList.add('in');io.unobserve(x.target);}}),{threshold:.08});
document.querySelectorAll('.gallery-item').forEach(el=>io.observe(el));
function openLb(card){const img=card.querySelector('img');document.getElementById('lb-img').src=img.src;document.getElementById('lb').classList.add('open');document.body.style.overflow='hidden';}
function closeLb(){document.getElementById('lb').classList.remove('open');document.body.style.overflow='';}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLb();});
</script>
