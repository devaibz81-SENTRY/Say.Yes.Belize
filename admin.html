<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Said Yes Belize</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root { --ink: #1a1a1a; --paper: #fdfcf8; --gold: #b88e44; --muted: #8c8c8c; --line: rgba(0,0,0,.08); --red: #d1453b; --green: #2d8a4e; }
    *,*::before,*::after{box-sizing:border-box}
    body {
      margin:0;background:var(--paper);color:var(--ink);font-family:"Plus Jakarta Sans",sans-serif;
      min-height:100vh;
    }
    .shell{width:min(1200px,calc(100% - 40px));margin:0 auto}
    header{background:var(--ink);color:var(--paper);padding:16px 0}
    header .shell{display:flex;align-items:center;justify-content:space-between}
    header h1{font-family:"Cormorant Garamond",serif;font-weight:300;font-size:24px;margin:0}
    header span{font-size:11px;opacity:.5;letter-spacing:.1em}
    #loginScreen {
      display:flex;align-items:center;justify-content:center;min-height:80vh;
      flex-direction:column;gap:20px;
    }
    #loginScreen h2{font-family:"Cormorant Garamond",serif;font-weight:300;font-size:36px;margin:0}
    #loginScreen input{padding:14px 18px;border:1px solid var(--line);border-radius:8px;font-size:16px;width:280px;text-align:center}
    #loginScreen button{padding:14px 32px;background:var(--ink);color:var(--paper);border:none;border-radius:999px;font-size:12px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;cursor:pointer}
    #loginScreen button:hover{background:var(--gold)}
    #loginScreen .error{color:var(--red);font-size:13px}
    .toolbar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:20px 0;border-bottom:1px solid var(--line);margin-bottom:20px}
    .toolbar select{padding:10px 14px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:13px}
    .toolbar .count{font-size:13px;color:var(--muted)}
    table{width:100%;border-collapse:collapse}
    th{text-align:left;font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);padding:12px 8px;border-bottom:2px solid var(--line)}
    td{padding:12px 8px;border-bottom:1px solid var(--line);font-size:14px;vertical-align:middle}
    tr:hover td{background:rgba(184,142,68,.04)}
    .status{padding:4px 10px;border-radius:999px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;display:inline-block}
    .status-new{background:#e8f0fe;color:#1a73e8}
    .status-contacted{background:#fef7e0;color:#e37400}
    .status-converted{background:#e6f4ea;color:#137333}
    .status-closed{background:#f1f3f4;color:#5f6368}
    .lead-link{color:var(--gold);text-decoration:none;font-weight:600;cursor:pointer}
    .lead-link:hover{text-decoration:underline}
    .lead-email{color:var(--ink);text-decoration:none}
    .lead-email:hover{text-decoration:underline;color:var(--gold)}
    .empty{text-align:center;padding:60px 0;color:var(--muted);font-size:15px}

    /* Detail modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
    .modal-overlay.active{display:flex}
    .modal{background:var(--paper);border-radius:16px;max-width:560px;width:100%;max-height:80vh;overflow-y:auto;padding:32px;box-shadow:0 24px 80px rgba(0,0,0,.2)}
    .modal h2{font-family:"Cormorant Garamond",serif;font-weight:300;font-size:28px;margin:0 0 20px}
    .modal .field{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line);font-size:14px}
    .modal .field .label{color:var(--muted);font-weight:600;font-size:11px;letter-spacing:.1em;text-transform:uppercase}
    .modal .field .value{text-align:right;max-width:60%}
    .modal .status-select{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap}
    .modal .status-select button{padding:8px 16px;border:1px solid var(--line);border-radius:999px;background:transparent;cursor:pointer;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;transition:all .15s}
    .modal .status-select button:hover{border-color:var(--gold)}
    .modal .status-select button.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
    .modal .close-btn{margin-top:20px;width:100%;padding:12px;background:var(--ink);color:var(--paper);border:none;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;cursor:pointer}
    .modal .close-btn:hover{background:var(--gold)}
    .toast{position:fixed;bottom:30px;right:30px;background:var(--ink);color:var(--paper);padding:14px 24px;border-radius:8px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s}
    .toast.show{opacity:1}
  </style>
</head>
<body>
  <header><div class="shell"><h1>SY · Admin</h1><span>Lead management</span></div></header>

  <!-- Login -->
  <div class="shell" id="loginScreen">
    <h2>Sign in</h2>
    <input type="password" id="passwordInput" placeholder="Admin password" autocomplete="off">
    <button id="loginBtn">Sign in</button>
    <div class="error" id="loginError"></div>
  </div>

  <!-- Dashboard (hidden until login) -->
  <div class="shell" id="dashboard" style="display:none">
    <div class="toolbar">
      <div style="display:flex;align-items:center;gap:12px">
        <select id="statusFilter">
          <option value="">All statuses</option>
          <option value="new">New</option>
          <option value="contacted">Contacted</option>
          <option value="converted">Converted</option>
          <option value="closed">Closed</option>
        </select>
      </div>
      <span class="count" id="leadCount">0 leads</span>
    </div>
    <table>
      <thead><tr><th>Date</th><th>Names</th><th>Email</th><th>Guests</th><th>Date</th><th>Status</th><th></th></tr></thead>
      <tbody id="leadsBody"></tbody>
    </table>
    <div class="empty" id="emptyState" style="display:none">No leads yet.</div>
  </div>

  <!-- Detail modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2 id="modalTitle">Lead Details</h2>
      <div id="modalFields"></div>
      <div class="status-select" id="modalActions"></div>
      <button class="close-btn" id="modalClose">Close</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    var CONVEX_SITE = 'https://outstanding-guanaco-830.convex.site';
    var password = sessionStorage.getItem('admin_pass') || '';

    function show(el) { el.style.display = ''; }
    function hide(el) { el.style.display = 'none'; }

    var loginScreen = document.getElementById('loginScreen');
    var dashboard = document.getElementById('dashboard');
    var passwordInput = document.getElementById('passwordInput');
    var loginBtn = document.getElementById('loginBtn');
    var loginError = document.getElementById('loginError');
    var leadsBody = document.getElementById('leadsBody');
    var leadCount = document.getElementById('leadCount');
    var emptyState = document.getElementById('emptyState');
    var statusFilter = document.getElementById('statusFilter');
    var modalOverlay = document.getElementById('modalOverlay');
    var modalTitle = document.getElementById('modalTitle');
    var modalFields = document.getElementById('modalFields');
    var modalActions = document.getElementById('modalActions');
    var modalClose = document.getElementById('modalClose');
    var toast = document.getElementById('toast');

    function showToast(msg) {
      toast.textContent = msg; toast.classList.add('show');
      setTimeout(function(){ toast.classList.remove('show'); }, 2500);
    }

    // Auto-login if password stored
    if (password) { loadLeads(); }

    loginBtn.addEventListener('click', function() {
      password = passwordInput.value.trim();
      if (!password) { loginError.textContent = 'Enter password'; return; }
      loginError.textContent = '';
      try { sessionStorage.setItem('admin_pass', password); } catch(e) {}
      loadLeads();
    });

    passwordInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') loginBtn.click();
    });

    statusFilter.addEventListener('change', loadLeads);

    function loadLeads() {
      fetch(CONVEX_SITE + '/admin/listLeads', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: password, status: statusFilter.value || undefined })
      })
      .then(function(r) { return r.json(); })
      .then(function(result) {
        if (!result.success) {
          loginError.textContent = result.error || 'Invalid password';
          hide(dashboard); show(loginScreen);
          try { sessionStorage.removeItem('admin_pass'); } catch(e) {}
          return;
        }
        show(dashboard); hide(loginScreen);
        renderLeads(result.leads || []);
      })
      .catch(function(err) {
        loginError.textContent = 'Connection error: ' + err.message;
      });
    }

    function renderLeads(leads) {
      leadCount.textContent = leads.length + ' lead' + (leads.length !== 1 ? 's' : '');
      if (leads.length === 0) {
        leadsBody.innerHTML = '';
        show(emptyState);
        return;
      }
      hide(emptyState);
      leadsBody.innerHTML = leads.map(function(l) {
        var date = l._creationTime ? new Date(l._creationTime).toLocaleDateString() : '—';
        var weddingDate = l.date ? new Date(l.date + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '—';
        var statusClass = 'status-' + (l.status || 'new');
        return '<tr>' +
          '<td style="font-size:12px;color:var(--muted)">' + date + '</td>' +
          '<td><strong>' + esc(l.names) + '</strong></td>' +
          '<td><a class="lead-email" href="mailto:' + esc(l.email) + '">' + esc(l.email) + '</a></td>' +
          '<td>' + (l.guests || '—') + '</td>' +
          '<td style="font-size:12px;color:var(--muted)">' + weddingDate + '</td>' +
          '<td><span class="status ' + statusClass + '">' + (l.status || 'new') + '</span></td>' +
          '<td><a class="lead-link" onclick="openLead(\'' + l.leadId + '\')">View</a></td>' +
          '</tr>';
      }).join('');
    }

    window.openLead = function(leadId) {
      fetch(CONVEX_SITE + '/admin/getLead', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: password, leadId: leadId })
      })
      .then(function(r) { return r.json(); })
      .then(function(result) {
        if (!result.success || !result.lead) return;
        var l = result.lead;
        modalTitle.textContent = l.names || 'Lead Details';
        modalFields.innerHTML =
          field('Lead ID', l.leadId) +
          field('Email', '<a href="mailto:' + esc(l.email) + '">' + esc(l.email) + '</a>') +
          field('Phone', l.phone || '—') +
          field('Wedding Date', l.date ? new Date(l.date + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }) : '—') +
          field('Guests', l.guests || '—') +
          field('Template', l.templateId || '—') +
          field('Venue', l.location || '—') +
          field('Message', l.message || '—') +
          field('Status', '<span class="status status-' + (l.status || 'new') + '">' + (l.status || 'new') + '</span>') +
          field('Created', new Date(l._creationTime).toLocaleString());
        modalActions.innerHTML = ['new','contacted','converted','closed'].map(function(s) {
          var active = (l.status || 'new') === s ? ' active' : '';
          return '<button class="' + active + '" onclick="updateStatus(\'' + l.leadId + '\',\'' + s + '\')">' + s + '</button>';
        }).join('');
        modalOverlay.classList.add('active');
      });
    };

    window.updateStatus = function(leadId, status) {
      fetch(CONVEX_SITE + '/admin/updateStatus', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: password, leadId: leadId, status: status })
      })
      .then(function(r) { return r.json(); })
      .then(function(result) {
        if (result.success) {
          showToast('Status updated to ' + status);
          loadLeads();
          // Re-open to refresh detail view
          document.querySelectorAll('.modal-overlay').active || null;
          // Refresh the open modal if still visible
          if (modalOverlay.classList.contains('active')) openLead(leadId);
        }
      });
    };

    modalClose.addEventListener('click', function() { modalOverlay.classList.remove('active'); });
    modalOverlay.addEventListener('click', function(e) { if (e.target === modalOverlay) modalOverlay.classList.remove('active'); });

    function field(label, value) {
      return '<div class="field"><span class="label">' + label + '</span><span class="value">' + value + '</span></div>';
    }
    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  </script>
</body>
</html>
