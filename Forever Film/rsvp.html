<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RSVP — Forever Film</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Be+Vietnam+Pro:wght@300;400;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
tailwind.config={darkMode:"class",theme:{extend:{colors:{"tertiary":"#fbc66f","background":"#131313","surface-container":"#201f1f","surface-container-high":"#2a2a2a","surface-container-highest":"#353534","on-surface":"#e5e2e1","on-surface-variant":"#d0c5af","primary":"#f2ca50","primary-container":"#d4af37","on-primary":"#3c2f00","outline-variant":"#4d4635","outline":"#99907c"},spacing:{"frame-margin":"4rem","section-padding":"8rem"},fontFamily:{"hero-title":["Noto Serif"],"body-classic":["Be Vietnam Pro"],"movie-headline":["Noto Serif"],"caption-info":["Be Vietnam Pro"],"credit-label":["Be Vietnam Pro"]},fontSize:{"hero-title":["84px",{"lineHeight":"92px","letterSpacing":"-0.02em","fontWeight":"700"}],"body-classic":["18px",{"lineHeight":"28px","letterSpacing":"0.01em","fontWeight":"300"}],"movie-headline":["48px",{"lineHeight":"56px","letterSpacing":"0.05em","fontWeight":"400"}],"caption-info":["14px",{"lineHeight":"20px","fontWeight":"400"}],"credit-label":["12px",{"lineHeight":"16px","letterSpacing":"0.3em","fontWeight":"600"}]}}}}
</script>
<style>
.material-symbols-outlined{font-variation-settings:"FILL" 0,"wght" 400,"GRAD" 0,"opsz" 24}
.film-grain{background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity:.05;pointer-events:none}
.projector-beam{background:linear-gradient(45deg,rgba(212,175,55,.08) 0%,transparent 70%)}
.halation-glow{text-shadow:0 0 12px rgba(212,175,55,.4),0 0 24px rgba(212,175,55,.2)}
.hide-scrollbar::-webkit-scrollbar{display:none}
.hide-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
.develop{opacity:0;filter:saturate(0) brightness(1.4);transform:scale(.97);transition:opacity .9s ease,filter 1.1s ease,transform .8s ease}
.develop.in{opacity:1;filter:saturate(1) brightness(1);transform:scale(1)}
</style>
  <link href="../fonts.css" rel="stylesheet"/>
  <link href="../premium.css" rel="stylesheet"/>
</head>
<body class="bg-background text-on-background font-body-classic" style="min-height:100dvh">
<div class="fixed inset-0 film-grain z-[100]"></div>
<div class="fixed inset-0 projector-beam z-0 pointer-events-none"></div>

<header class="fixed top-0 left-0 w-full z-[60] bg-black/80 backdrop-blur-2xl border-b border-yellow-600/20 shadow-[0_0_15px_rgba(212,175,55,.1)] flex justify-between items-center px-6 py-4">
  <span class="material-symbols-outlined text-yellow-600 cursor-pointer">menu</span>
  <h1 class="text-lg italic font-serif tracking-[0.4em] text-yellow-600">FOREVER FILM</h1>
  <span class="material-symbols-outlined text-yellow-600 cursor-pointer">confirmation_number</span>
</header>

<main class="relative z-10 pt-24 pb-32">

  <!-- Hero -->
  <section class="px-frame-margin py-16 text-center max-w-4xl mx-auto">
    <p class="font-credit-label text-credit-label text-primary-container mb-4">THE PREMIERE AWAITS</p>
    <h1 class="font-hero-title italic text-primary halation-glow" style="font-size:clamp(2.5rem,8vw,5rem)">Reserve Your Seat</h1>
    <div class="w-24 h-px bg-primary/30 mx-auto mt-8"></div>
  </section>

  <!-- Countdown Widget -->
  <section class="px-frame-margin py-8 max-w-4xl mx-auto text-center">
    <div id="countdown-widget" class="grid grid-cols-4 gap-4 max-w-lg mx-auto">
      <div class="bg-surface-container/80 border border-primary/10 rounded-sm p-4 backdrop-blur-sm">
        <p class="font-hero-title text-3xl text-primary halation-glow" id="cd-days">00</p>
        <p class="font-caption-info text-caption-info text-on-surface-variant mt-1">Days</p>
      </div>
      <div class="bg-surface-container/80 border border-primary/10 rounded-sm p-4 backdrop-blur-sm">
        <p class="font-hero-title text-3xl text-primary halation-glow" id="cd-hours">00</p>
        <p class="font-caption-info text-caption-info text-on-surface-variant mt-1">Hours</p>
      </div>
      <div class="bg-surface-container/80 border border-primary/10 rounded-sm p-4 backdrop-blur-sm">
        <p class="font-hero-title text-3xl text-primary halation-glow" id="cd-minutes">00</p>
        <p class="font-caption-info text-caption-info text-on-surface-variant mt-1">Minutes</p>
      </div>
      <div class="bg-surface-container/80 border border-primary/10 rounded-sm p-4 backdrop-blur-sm">
        <p class="font-hero-title text-3xl text-primary halation-glow" id="cd-seconds">00</p>
        <p class="font-caption-info text-caption-info text-on-surface-variant mt-1">Seconds</p>
      </div>
    </div>
  </section>

  <!-- RSVP Form -->
  <section class="px-frame-margin py-12 max-w-2xl mx-auto">
    <div class="bg-surface-container/60 backdrop-blur-xl border border-primary/20 rounded-sm p-8 md:p-12 shadow-[0_0_40px_rgba(212,175,55,.05)]">
      <form id="rsvp-form" class="space-y-8">
        <div>
          <label class="font-caption-info text-caption-info text-primary-container block mb-2 tracking-wider">FULL NAME</label>
          <input type="text" name="name" required
            class="w-full bg-background/80 border border-outline-variant/40 rounded-sm px-4 py-3 font-body-classic text-on-surface placeholder:text-on-surface-variant/40 focus:outline-none focus:border-primary/60 focus:ring-1 focus:ring-primary/30 transition-all duration-300"/>
        </div>
        <div>
          <label class="font-caption-info text-caption-info text-primary-container block mb-2 tracking-wider">EMAIL ADDRESS</label>
          <input type="email" name="email" required
            class="w-full bg-background/80 border border-outline-variant/40 rounded-sm px-4 py-3 font-body-classic text-on-surface placeholder:text-on-surface-variant/40 focus:outline-none focus:border-primary/60 focus:ring-1 focus:ring-primary/30 transition-all duration-300"/>
        </div>
        <div>
          <label class="font-caption-info text-caption-info text-primary-container block mb-2 tracking-wider">NUMBER OF GUESTS</label>
          <select name="guests" required
            class="w-full bg-background/80 border border-outline-variant/40 rounded-sm px-4 py-3 font-body-classic text-on-surface focus:outline-none focus:border-primary/60 focus:ring-1 focus:ring-primary/30 transition-all duration-300">
            <option value="" disabled selected>Select number of seats</option>
            <option value="1">1 Guest</option>
            <option value="2">2 Guests</option>
            <option value="3">3 Guests</option>
            <option value="4">4 Guests</option>
            <option value="5">5 Guests</option>
          </select>
        </div>
        <div>
          <label class="font-caption-info text-caption-info text-primary-container block mb-2 tracking-wider">DIETARY NOTES</label>
          <textarea name="dietary" rows="3"
            class="w-full bg-background/80 border border-outline-variant/40 rounded-sm px-4 py-3 font-body-classic text-on-surface placeholder:text-on-surface-variant/40 focus:outline-none focus:border-primary/60 focus:ring-1 focus:ring-primary/30 transition-all duration-300 resize-none"
            placeholder="Any allergies or dietary restrictions..."></textarea>
        </div>
        <div>
          <label class="font-caption-info text-caption-info text-primary-container block mb-2 tracking-wider">A MESSAGE FOR THE COUPLE</label>
          <textarea name="message" rows="4"
            class="w-full bg-background/80 border border-outline-variant/40 rounded-sm px-4 py-3 font-body-classic text-on-surface placeholder:text-on-surface-variant/40 focus:outline-none focus:border-primary/60 focus:ring-1 focus:ring-primary/30 transition-all duration-300 resize-none"
            placeholder="Write your congratulations..."></textarea>
        </div>
        <button type="submit"
          class="w-full py-4 bg-primary/10 border border-primary text-primary font-credit-label hover:bg-primary hover:text-on-primary transition-all duration-500 tracking-[0.4em] text-sm rounded-sm cursor-pointer">
          CONFIRM RESERVATION
        </button>
      </form>
    </div>
  </section>

  <!-- Details -->
  <section class="max-w-2xl mx-auto text-center px-frame-margin py-12">
    <div class="grid md:grid-cols-2 gap-6">
      <div class="bg-surface-container/40 border border-primary/10 rounded-sm p-6 backdrop-blur-sm develop">
        <span class="material-symbols-outlined text-primary mb-3" style="font-size:2rem">calendar_month</span>
        <p class="font-caption-info text-caption-info text-primary-container mb-2">DATE</p>
        <p class="font-body-classic text-on-surface">August 15, 2026</p>
      </div>
      <div class="bg-surface-container/40 border border-primary/10 rounded-sm p-6 backdrop-blur-sm develop">
        <span class="material-symbols-outlined text-primary mb-3" style="font-size:2rem">location_on</span>
        <p class="font-caption-info text-caption-info text-primary-container mb-2">VENUE</p>
        <p class="font-body-classic text-on-surface">The Ritz-Carlton<br/>Grand Ballroom</p>
      </div>
    </div>
  </section>

</main>

<nav class="fixed bottom-0 left-0 w-full z-50 bg-black/90 backdrop-blur-3xl border-t border-yellow-600/10 shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
  <div class="flex justify-around items-center px-4 pb-6 pt-2">
    <a class="flex flex-col items-center text-gray-500 pt-2 opacity-60 hover:opacity-100" href="invitation.html"><span class="material-symbols-outlined mb-1">movie</span><span class="font-serif text-[10px] tracking-widest uppercase">Feature</span></a>
    <a class="flex flex-col items-center text-gray-500 pt-2 opacity-60 hover:opacity-100" href="our-story.html"><span class="material-symbols-outlined mb-1">history_edu</span><span class="font-serif text-[10px] tracking-widest uppercase">Story</span></a>
    <a class="flex flex-col items-center text-yellow-600 border-t-2 border-yellow-600 pt-2"><span class="material-symbols-outlined mb-1" style="font-variation-settings:'FILL' 1">confirmation_number</span><span class="font-serif text-[10px] tracking-widest uppercase">RSVP</span></a>
    <a class="flex flex-col items-center text-gray-500 pt-2 opacity-60 hover:opacity-100" href="gallery.html"><span class="material-symbols-outlined mb-1">photo_library</span><span class="font-serif text-[10px] tracking-widest uppercase">Gallery</span></a>
  </div>
</nav>

<script>
const io=new IntersectionObserver(e=>e.forEach(x=>{if(x.isIntersecting){x.target.classList.add('in');io.unobserve(x.target);}}),{threshold:.08});
document.querySelectorAll('.develop').forEach(el=>io.observe(el));
</script>

<script src="../guided-tour.js"></script>
<script src="../photo-uploader.js"></script>
<script src="../editable-fields.js"></script>
<script src="../interactive-template-init.js"></script>
<script src="forever-film-init.js"></script>
<script src="../mobile-optimize.js"></script>
<script src="../font-picker.js"></script>
<script src="../premium.js"></script>
<script src="../countdown-widget.js"></script>
</body></html>
