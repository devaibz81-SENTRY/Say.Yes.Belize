<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&amp;family=Noto+Serif:ital,wght@0,300;0,400;1,300&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(251, 249, 249, 0.6);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
        }
        .premium-glow:hover {
            box-shadow: 0 0 20px rgba(180, 150, 50, 0.2);
        }
        input:focus {
            outline: none;
            border-bottom-color: #735c00 !important;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#735c00",
                        "outline": "#7f7663",
                        "secondary-fixed": "#e5e2e1",
                        "on-error": "#ffffff",
                        "on-tertiary-container": "#444542",
                        "on-tertiary-fixed": "#1b1c19",
                        "on-primary-fixed-variant": "#574500",
                        "on-secondary-container": "#636262",
                        "tertiary": "#5e5f5b",
                        "inverse-surface": "#303031",
                        "tertiary-container": "#b3b3af",
                        "secondary": "#5f5e5e",
                        "outline-variant": "#d0c5af",
                        "on-secondary-fixed": "#1c1b1b",
                        "inverse-primary": "#e9c349",
                        "surface-tint": "#735c00",
                        "on-primary": "#ffffff",
                        "surface-variant": "#e3e2e2",
                        "tertiary-fixed": "#e3e3de",
                        "surface-container-high": "#e9e8e7",
                        "surface-dim": "#dbdad9",
                        "on-secondary-fixed-variant": "#474746",
                        "surface-container-lowest": "#ffffff",
                        "secondary-fixed-dim": "#c8c6c5",
                        "secondary-container": "#e2dfde",
                        "primary-fixed": "#ffe088",
                        "primary-container": "#d4af37",
                        "on-tertiary-fixed-variant": "#464744",
                        "on-error-container": "#93000a",
                        "inverse-on-surface": "#f2f0f0",
                        "on-primary-fixed": "#241a00",
                        "on-surface": "#1b1c1c",
                        "on-primary-container": "#554300",
                        "surface-container": "#efeded",
                        "error-container": "#ffdad6",
                        "surface-bright": "#fbf9f9",
                        "surface": "#fbf9f9",
                        "primary-fixed-dim": "#e9c349",
                        "tertiary-fixed-dim": "#c7c7c2",
                        "on-surface-variant": "#4d4635",
                        "error": "#ba1a1a",
                        "on-secondary": "#ffffff",
                        "background": "#fbf9f9",
                        "on-tertiary": "#ffffff",
                        "on-background": "#1b1c1c",
                        "surface-container-low": "#f5f3f3",
                        "surface-container-highest": "#e3e2e2"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "ui-label": ["Inter"],
                        "headline-md": ["Noto Serif"],
                        "display-hero": ["Noto Serif"],
                        "body-lg": ["Inter"],
                        "caption": ["Inter"],
                        "headline-lg": ["Noto Serif"]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
    <link href="../fonts.css" rel="stylesheet"/>
  <link href="../premium.css" rel="stylesheet"/>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen overflow-hidden">
<!-- Hero Background Wrapper -->
<div class="fixed inset-0 z-0">
<img class="w-full h-full object-cover grayscale-[20%] brightness-75" data-alt="A sprawling, high-end outdoor wedding reception set against a coastal Mediterranean sunset. The scene is bathed in warm golden hour light, highlighting long linen-draped tables decorated with cream roses and champagne-colored candles. The background features a soft-focus vista of the ocean and rocky cliffs under a pale ivory sky. The overall mood is one of ethereal luxury, exclusivity, and quiet elegance, perfectly matching a minimalist fashion aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAHy8kmrKYbuXjNzkSRecbXOGxvmElYxLHCmNnDqdUKyk95K7-b7p79sBhbJsTGH7WlnDqWxXoPZrLb_xqhMISayafDElJF8Yn94QC0B7HBDj0flGq8ajh79_plbozJqhGeTXFJMiGlp08IEGxoDYzReK5WxU-DicBlf4yM1f26jlB-Dtf2PH4WifCCifTRbtowMc15duOouqxdS8XnoG6-EcD1SN5OPqFcY8-MzRLCHPoyuw7nPMQGaJTeyMbJEFDRA9XWqmTcu_hs"/>
</div>
<!-- Top Navigation Shell -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-stone-50/60 backdrop-blur-xl border-b-[0.5px] border-amber-200/50 shadow-sm shadow-black/5">
<div class="flex items-center gap-4">
<button class="text-amber-600 hover:opacity-70 transition-opacity duration-500">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<span class="font-serif tracking-widest uppercase text-xs text-stone-400">ELEGANCE &amp; GRACE</span>
</div>
<div class="font-serif italic text-xl tracking-tighter text-amber-600">A &amp; B</div>
<button class="text-amber-600 hover:opacity-70 transition-opacity duration-500">
<span class="material-symbols-outlined" data-icon="favorite">favorite</span>
</button>
</header>
<!-- RSVP Modal Overlay -->
<div class="fixed inset-0 z-[60] flex items-center justify-center p-4 sm:p-8 bg-stone-900/40 backdrop-blur-sm">
<div class="glass-panel w-full max-w-2xl rounded-none border-[0.5px] border-amber-200/50 shadow-2xl relative overflow-hidden flex flex-col items-center p-12 md:p-20 text-center">
<!-- Close Action -->
<button class="absolute top-8 right-8 text-outline hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<!-- Modal Header -->
<div class="mb-12">
<span class="font-ui-label text-ui-label text-primary block mb-4">JOIN US FOR THE CEREMONY</span>
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-2">Request Your Presence</h1>
    <div class="w-12 h-[0.5px] bg-primary mx-auto"></div>
</div>
<!-- Countdown Widget -->
<div class="vows-countdown mb-10"></div>
<!-- RSVP Form -->
<form class="w-full space-y-12">
<div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-10 text-left">
<!-- Input Group -->
<div class="relative">
<label class="font-ui-label text-ui-label text-outline uppercase mb-2 block">Full Name</label>
<input class="w-full bg-transparent border-t-0 border-x-0 border-b-[0.5px] border-outline-variant p-0 pb-2 text-body-md font-body-md placeholder:text-stone-300 focus:ring-0 transition-all" placeholder="GUEST NAME" type="text"/>
</div>
<!-- Input Group -->
<div class="relative">
<label class="font-ui-label text-ui-label text-outline uppercase mb-2 block">Email Address</label>
<input class="w-full bg-transparent border-t-0 border-x-0 border-b-[0.5px] border-outline-variant p-0 pb-2 text-body-md font-body-md placeholder:text-stone-300 focus:ring-0 transition-all" placeholder="YOUR@EMAIL.COM" type="email"/>
</div>
<!-- Input Group -->
<div class="relative">
<label class="font-ui-label text-ui-label text-outline uppercase mb-2 block">Attendance</label>
<select class="w-full bg-transparent border-t-0 border-x-0 border-b-[0.5px] border-outline-variant p-0 pb-2 text-body-md font-body-md focus:ring-0 appearance-none cursor-pointer">
<option>JOYFULLY ATTENDING</option>
<option>REGRETFULLY DECLINE</option>
</select>
</div>
<!-- Input Group -->
<div class="relative">
<label class="font-ui-label text-ui-label text-outline uppercase mb-2 block">Guests Count</label>
<input class="w-full bg-transparent border-t-0 border-x-0 border-b-[0.5px] border-outline-variant p-0 pb-2 text-body-md font-body-md placeholder:text-stone-300 focus:ring-0 transition-all" placeholder="0" type="number"/>
</div>
</div>
<!-- Textarea -->
<div class="relative text-left">
<label class="font-ui-label text-ui-label text-outline uppercase mb-2 block">Dietary Preferences &amp; Notes</label>
<textarea class="w-full bg-transparent border-t-0 border-x-0 border-b-[0.5px] border-outline-variant p-0 pb-2 text-body-md font-body-md placeholder:text-stone-300 focus:ring-0 resize-none transition-all" placeholder="OPTIONAL MESSAGE" rows="1"></textarea>
</div>
<!-- CTA -->
<div class="pt-8 flex flex-col items-center gap-6">
<button class="group relative px-12 py-4 bg-on-surface text-surface-container-lowest font-ui-label text-ui-label uppercase tracking-[0.3em] premium-glow transition-all duration-500 hover:tracking-[0.4em] active:scale-95 overflow-hidden">
<span class="relative z-10">Send RSVP</span>
<div class="absolute inset-0 bg-primary opacity-0 group-hover:opacity-10 transition-opacity"></div>
</button>
<p class="font-caption text-caption text-stone-500 italic">Please respond by September 15th, 2024</p>
</div>
</form>
<!-- Decorative Element -->
<div class="absolute -bottom-10 -right-10 opacity-5 pointer-events-none">
<span class="material-symbols-outlined text-[200px]" data-icon="auto_stories">auto_stories</span>
</div>
</div>
</div>
<!-- Bottom Navigation Shell (Mobile Responsive) -->
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-safe h-20 bg-stone-50/80 backdrop-blur-2xl border-t-[0.5px] border-amber-200/50 shadow-[0_-4px_20px_rgba(0,0,0,0.03)]">
<a class="flex flex-col items-center justify-center text-stone-400 pt-2 hover:text-amber-500 transition-colors duration-300" href="#">
<span class="material-symbols-outlined" data-icon="home_wedding">home</span>
<span class="font-serif text-[10px] uppercase tracking-widest mt-1">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-stone-400 pt-2 hover:text-amber-500 transition-colors duration-300" href="#">
<span class="material-symbols-outlined" data-icon="calendar_today">calendar_today</span>
<span class="font-serif text-[10px] uppercase tracking-widest mt-1">Schedule</span>
</a>
<a class="flex flex-col items-center justify-center text-stone-400 pt-2 hover:text-amber-500 transition-colors duration-300" href="#">
<span class="material-symbols-outlined" data-icon="card_giftcard">card_giftcard</span>
<span class="font-serif text-[10px] uppercase tracking-widest mt-1">Registry</span>
</a>
<a class="flex flex-col items-center justify-center text-amber-700 font-bold border-t-2 border-amber-600 -mt-[0.5px] pt-2" href="#">
<span class="material-symbols-outlined" data-icon="mail" style="font-variation-settings: 'FILL' 1;">mail</span>
<span class="font-serif text-[10px] uppercase tracking-widest mt-1">RSVP</span>
</a>
</nav>

<!-- Core Interactive Systems -->
<script src="../guided-tour.js"></script>
<script src="../photo-uploader.js"></script>
<script src="../editable-fields.js"></script>
<script src="../interactive-template-init.js"></script>

<!-- Editorial Luxury Template Initialization -->
<script src="editorial-luxury-init.js"></script>
<script src="../countdown-widget.js"></script>

<script src="../mobile-optimize.js"></script>
  <script src="../font-picker.js"></script>
  <script src="../premium.js"></script>
</body></html>
