        "primary": "#735c00","outline": "#7f7663","secondary-fixed": "#e5e2e1","on-error": "#ffffff","on-tertiary-container": "#444542","on-tertiary-fixed": "#1b1c19","on-primary-fixed-variant": "#574500","on-secondary-container": "#636262","tertiary": "#5e5f5b","inverse-surface": "#303031","tertiary-container": "#b3b3af","secondary": "#5f5e5e","outline-variant": "#d0c5af","on-secondary-fixed": "#1c1b1b","inverse-primary": "#e9c349","surface-tint": "#735c00","on-primary": "#ffffff","surface-variant": "#e3e2e2","tertiary-fixed": "#e3e3de","surface-container-high": "#e9e8e7","surface-dim": "#dbdad9","on-secondary-fixed-variant": "#474746","surface-container-lowest": "#ffffff","secondary-fixed-dim": "#c8c6c5","secondary-container": "#e2dfde","primary-fixed": "#ffe088","primary-container": "#d4af37","on-tertiary-fixed-variant": "#464744","on-error-container": "#93000a","inverse-on-surface": "#f2f0f0","on-primary-fixed": "#241a00","on-surface": "#1b1c1c","on-primary-container": "#554300","surface-container": "#efeded","error-container": "#ffdad6","surface-bright": "#fbf9f9","surface": "#fbf9f9","primary-fixed-dim": "#e9c349","tertiary-fixed-dim": "#c7c7c2","on-surface-variant": "#4d4635","error": "#ba1a1a","on-secondary": "#ffffff","background": "#fbf9f9","on-tertiary": "#ffffff","on-background": "#1b1c1c","surface-container-low": "#f5f3f3","surface-container-highest": "#e3e2e2"

<body class="bg-background text-on-background font-body-md antialiased overflow-x-hidden selection:bg-primary-container selection:text-on-primary-container">

<!-- Fixed Top Nav with Breadcrumb -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-stone-50/60 backdrop-blur-xl border-b-[0.5px] border-amber-200/50 shadow-sm shadow-black/5">
<div class="flex items-center gap-4">
<a href="index.html" data-slide="index.html" data-direction="right" class="btn-feedback no-underline"><span class="material-symbols-outlined text-amber-600 hover:opacity-70 transition-opacity duration-500">arrow_back</span></a>
<span class="font-serif tracking-widest uppercase text-xs text-amber-600">ELEGANCE &amp; GRACE</span>
</div>
<div class="font-serif italic text-xl tracking-tighter text-amber-600">A &amp; B</div>
<div class="hidden md:flex items-center gap-6">
<nav class="flex space-x-6 font-serif text-[10px] uppercase tracking-widest">
<a href="index.html" data-slide="index.html" data-direction="right" style="color:#7f7663;text-decoration:none;transition:color .2s" onmouseover="this.style.color='#735c00'" onmouseout="this.style.color='#7f7663'">INVITATION</a>
<span style="opacity:0.5;color:#7f7663">● ———</span>
<span style="color:#735c00;font-weight:bold;border-bottom:1.5px solid #d4af37">RSVP</span>
</nav>
</div>
</header>

<!-- Hero Background -->
<div class="fixed inset-0 z-0">
<img class="w-full h-full object-cover grayscale-[20%] brightness-75" data-alt="A high-end outdoor wedding reception set against a coastal Mediterranean sunset" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAHy8kmrKYbuXjNzkSRecbXOGxvmElYxLHCmNnDqdUKyk95K7-b7p79sBhbJsTGH7WlnDqWxXoPZrLb_xqhMISayafDElJF8Yn94QC0B7HBDj0flGq8ajh79_plbozJqhGeTXFJMiGlp08IEGxoDYzReK5WxU-DicBlf4yM1f26jlB-Dtf2PH4WifCCifTRbtowMc15duOouqxdS8XnoG6-EcD1SN5OPqFcY8-MzRLCHPoyuw7nPMQGaJTeyMbJEFDRA9XWqmTcu_hs"/>
</div>

<main class="relative z-10 pt-32 pb-40 px-6 md:px-32 max-w-7xl mx-auto">

<!-- Back Button -->
<section class="premium-section mb-8">
<a href="index.html" data-slide="index.html" data-direction="right" class="btn-feedback font-ui-label text-ui-label text-primary uppercase tracking-widest flex items-center gap-2 no-underline hover:text-on-surface transition-colors"><span class="material-symbols-outlined">arrow_back</span>← Back to Invitation</a>
</section>

<!-- RSVP Modal -->
<div class="glass-panel w-full max-w-2xl mx-auto rounded-none border-[0.5px] border-amber-200/50 shadow-2xl relative overflow-hidden flex flex-col items-center p-12 md:p-20 text-center">
<div class="mb-12">
<span class="font-ui-label text-ui-label text-primary block mb-4">JOIN US FOR THE CEREMONY</span>
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-2">Request Your Presence</h1>
<div class="w-12 h-[0.5px] bg-primary mx-auto"></div>
</div>
<div class="vows-countdown mb-10"></div>
<form class="w-full space-y-12" onsubmit="event.preventDefault(); alert('Thank you! Your RSVP has been received.');">
<div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-10 text-left">
<div class="relative">
<label class="font-ui-label text-ui-label text-outline uppercase mb-2 block">Full Name</label>
<input class="w-full bg-transparent border-t-0 border-x-0 border-b-[0.5px] border-outline-variant p-0 pb-2 text-body-md font-body-md placeholder:text-stone-300 focus:ring-0 transition-all" placeholder="GUEST NAME" type="text" required/>
</div>
<div class="relative">
<label class="font-ui-label text-ui-label text-outline uppercase mb-2 block">Email Address</label>
<input class="w-full bg-transparent border-t-0 border-x-0 border-b-[0.5px] border-outline-variant p-0 pb-2 text-body-md font-body-md placeholder:text-stone-300 focus:ring-0 transition-all" placeholder="YOUR@EMAIL.COM" type="email" required/>
</div>
<div class="relative">
<label class="font-ui-label text-ui-label text-outline uppercase mb-2 block">Number of Guests</label>
<select class="w-full bg-transparent border-t-0 border-x-0 border-b-[0.5px] border-outline-variant p-0 pb-2 text-body-md font-body-md focus:ring-0 appearance-none cursor-pointer">
<option>1 Guest</option>
<option>2 Guests</option>
<option>3 Guests</option>
<option>4 Guests</option>
</select>
</div>
<div class="relative">
<label class="font-ui-label text-ui-label text-outline uppercase mb-2 block">Attendance</label>
<select class="w-full bg-transparent border-t-0 border-x-0 border-b-[0.5px] border-outline-variant p-0 pb-2 text-body-md font-body-md focus:ring-0 appearance-none cursor-pointer">
<option>JOYFULLY ATTENDING</option>
<option>REGRETFULLY DECLINE</option>
</select>
</div>
</div>
<div class="relative text-left">
<label class="font-ui-label text-ui-label text-outline uppercase mb-2 block">Dietary Requirements</label>
<textarea class="w-full bg-transparent border-t-0 border-x-0 border-b-[0.5px] border-outline-variant p-0 pb-2 text-body-md font-body-md placeholder:text-stone-300 focus:ring-0 resize-none transition-all" placeholder="ALLERGIES, PREFERENCES" rows="1"></textarea>
</div>
<div class="relative text-left">
<label class="font-ui-label text-ui-label text-outline uppercase mb-2 block">A Message for the Couple</label>
<textarea class="w-full bg-transparent border-t-0 border-x-0 border-b-[0.5px] border-outline-variant p-0 pb-2 text-body-md font-body-md placeholder:text-stone-300 focus:ring-0 resize-none transition-all" placeholder="OPTIONAL MESSAGE" rows="1"></textarea>
</div>
<div class="pt-8 flex flex-col items-center gap-6">
<button class="btn-feedback group relative px-12 py-4 bg-on-surface text-surface-container-lowest font-ui-label text-ui-label uppercase tracking-[0.3em] premium-glow transition-all duration-500 hover:tracking-[0.4em] overflow-hidden" type="submit">
<span class="relative z-10">Send RSVP</span>
<div class="absolute inset-0 bg-primary opacity-0 group-hover:opacity-10 transition-opacity"></div>
</button>
<p class="font-caption text-caption text-stone-500 italic">Please respond by September 15th, 2024</p>
</div>
</form>
<div class="absolute -bottom-10 -right-10 opacity-5 pointer-events-none">
<span class="material-symbols-outlined text-[200px]">auto_stories</span>
</div>
</div>
</main>

<!-- Mobile Bottom Nav -->
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-safe h-20 bg-stone-50/80 backdrop-blur-2xl border-t-[0.5px] border-amber-200/50 shadow-[0_-4px_20px_rgba(0,0,0,0.03)]">

<span class="material-symbols-outlined">home</span>
<span class="font-serif text-[10px] uppercase tracking-widest mt-1">Home</span>
</a>
<a href="#" class="btn-feedback flex flex-col items-center justify-center text-amber-700 font-bold border-t-2 border-amber-600 -mt-[0.5px] pt-2 no-underline">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">mail</span>
<span class="font-serif text-[10px] uppercase tracking-widest mt-1">RSVP</span>
</a>
</nav>

<script src="../countdown-widget.js"></script>
<script src="../page-transition.js"></script>
<script src="../font-picker.js"></script>
<script src="../premium.js"></script>
