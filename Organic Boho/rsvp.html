<body class="bg-background text-on-surface font-body-md overflow-x-hidden paper-texture">

<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/90 backdrop-blur-md border-b-[0.5px] border-primary/10 shadow-sm flex items-center justify-between px-6 py-4">
  <button class="hover:opacity-70 transition-opacity duration-500 text-primary">
    <span class="material-symbols-outlined">menu</span>
  </button>
  <h1 class="font-headline-md italic text-2xl tracking-wide text-primary">Evelyn &amp; Julian</h1>
  <button class="hover:opacity-70 transition-opacity duration-500 text-primary">
    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">favorite</span>
  </button>
</header>

<main class="pt-24 pb-32 max-w-4xl mx-auto px-6 space-y-20">

  <!-- RSVP Hero Section -->
  <section class="relative text-center space-y-6">
    <div class="absolute -top-10 -left-10 w-40 h-40 bg-primary-container/20 rounded-full blur-3xl watercolor-blot"></div>
    <p class="font-label-caps text-secondary uppercase tracking-[0.2em] mb-2">RSVP</p>
    <h2 class="font-headline-display text-primary text-headline-display">Will You Join Us?</h2>
    <div class="w-16 h-[1px] bg-outline-variant mx-auto"></div>
    <p class="font-body-lg text-on-surface max-w-2xl mx-auto leading-relaxed">
      We would be honored to have you celebrate with us. Please let us know if you can make it by <span class="text-primary font-medium">May 1st, 2026</span>.
    </p>
  </section>

  <div class="vows-countdown" style="margin: 24px 0;"></div>

  <!-- RSVP Form Section -->
  <section class="max-w-xl mx-auto w-full">
    <div class="relative">
      <div class="absolute inset-0 bg-primary-container/20 rotate-1 rounded-xl -z-10 deckled-edge"></div>
      <div class="bg-white/90 backdrop-blur-sm p-8 md:p-12 rounded-xl shadow-lg border border-outline-variant/40">
        <div class="text-center mb-10">
          <span class="material-symbols-outlined text-primary text-3xl mb-3">edit_note</span>
          <h3 class="font-headline-md text-primary">Kindly Respond</h3>
        </div>

        <form class="space-y-6" onsubmit="event.preventDefault(); alert('Thank you! Your RSVP has been received.');">
          <div>
            <label for="name" class="block font-label-caps text-xs text-on-surface-variant uppercase tracking-wider mb-2">Your Name</label>
            <input type="text" id="name" name="name" required
              class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-lg font-body-md text-on-surface placeholder-on-surface-variant/50 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all duration-300" placeholder="e.g. Jane Doe" />
          </div>

          <div>
            <label for="email" class="block font-label-caps text-xs text-on-surface-variant uppercase tracking-wider mb-2">Email Address</label>
            <input type="email" id="email" name="email" required
              class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-lg font-body-md text-on-surface placeholder-on-surface-variant/50 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all duration-300" placeholder="e.g. jane@example.com" />
          </div>

          <div>
            <label for="attendance" class="block font-label-caps text-xs text-on-surface-variant uppercase tracking-wider mb-2">Will You Attend?</label>
            <select id="attendance" name="attendance" required
              class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-lg font-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all duration-300">
              <option value="" disabled selected>Please select...</option>
              <option value="yes">Joyfully Accept</option>
              <option value="no">Regretfully Decline</option>
            </select>
          </div>

          <div>
            <label for="guests" class="block font-label-caps text-xs text-on-surface-variant uppercase tracking-wider mb-2">Number of Guests</label>
            <select id="guests" name="guests"
              class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-lg font-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all duration-300">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
            </select>
          </div>

          <div>
            <label for="dietary" class="block font-label-caps text-xs text-on-surface-variant uppercase tracking-wider mb-2">Dietary Notes</label>
            <textarea id="dietary" name="dietary" rows="3"
              class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-lg font-body-md text-on-surface placeholder-on-surface-variant/50 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all duration-300 resize-none" placeholder="Any allergies or dietary preferences..."></textarea>
          </div>

          <button type="submit"
            class="w-full bg-primary text-on-primary px-10 py-4 rounded-full font-label-caps text-sm uppercase tracking-widest hover:scale-[1.02] transition-all duration-500 shadow-lg shadow-primary/20">
            Send RSVP
          </button>
        </form>

        <p class="text-center mt-8 text-xs text-on-surface-variant/60 font-body-md">
          We look forward to celebrating with you.
        </p>
      </div>
    </div>
  </section>

  <!-- Nature Detail -->
  <section class="text-center py-8">
    <span class="material-symbols-outlined text-primary/30 text-5xl">park</span>
  </section>

</main>

<!-- BottomNavBar -->
<nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md rounded-[40px] bg-white/90 backdrop-blur-md border border-primary/10 shadow-[0_8px_30px_rgb(138,75,55,0.1)] z-50 flex justify-around items-center px-4 py-2">

    <span class="material-symbols-outlined">auto_stories</span>
  </a>
  <a class="text-stone-400 p-3 hover:scale-110 transition-transform duration-500" href="event-details.html">
    <span class="material-symbols-outlined">calendar_month</span>
  </a>
  <a class="text-stone-400 p-3 hover:scale-110 transition-transform duration-500" href="our-story.html">
    <span class="material-symbols-outlined">edit_note</span>
  </a>
  <a class="text-stone-400 p-3 hover:scale-110 transition-transform duration-500" href="gallery.html">
    <span class="material-symbols-outlined">photo_library</span>
  </a>
</nav>
