<style>
body { min-height: max(884px, 100dvh); }
.silk-gradient {
  background: linear-gradient(180deg, #fbf9f7 0%, #fbdcd6 40%, #f5d6d1 70%, #fbf9f7 100%);
  background-attachment: fixed;
}
.glass-card {
  background: rgba(255, 255, 255, 0.4);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.3);
}
.watercolor-overlay {
  background:
    radial-gradient(ellipse 80% 60% at 15% 10%,  rgba(251,220,214,0.55) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 85% 20%,  rgba(245,214,209,0.40) 0%, transparent 55%),
    radial-gradient(ellipse 70% 70% at 50% 90%,  rgba(233,195,73,0.12)  0%, transparent 65%),
    radial-gradient(ellipse 90% 80% at 10% 80%,  rgba(112,89,85,0.06)   0%, transparent 70%);
  background-size: cover;
  background-attachment: fixed;
  pointer-events: none;
}
.material-symbols-outlined {
  font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
}
.bloom-reveal {
  opacity: 0;
  transform: translateY(28px);
  transition: opacity 0.8s cubic-bezier(0.25,0.46,0.45,0.94), transform 0.8s cubic-bezier(0.25,0.46,0.45,0.94);
}
.bloom-reveal.bloom-in { opacity: 1; transform: translateY(0); }
.bloom-delay-1 { transition-delay: 0.08s !important; }
.bloom-delay-2 { transition-delay: 0.18s !important; }
.bloom-delay-3 { transition-delay: 0.32s !important; }
.bloom-delay-4 { transition-delay: 0.48s !important; }
.glass-card {
  transition: transform 0.45s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.45s ease !important;
  will-change: transform;
}
.glass-card:hover {
  transform: translateY(-7px) !important;
  box-shadow: 0 28px 64px rgba(112,89,85,0.18), 0 8px 20px rgba(245,214,209,0.4) !important;
}
@keyframes bloom-header-in {
  from { opacity: 0; transform: translateY(-20px); }
  to   { opacity: 1; transform: translateY(0); }
}
header { animation: bloom-header-in 0.6s 0.1s ease both; }
button:active, a:active {
  transition: transform 0.08s ease !important;
  transform: scale(0.95) !important;
}
form input, form select, form textarea {
  transition: all 0.25s ease;
}
form input:focus, form select:focus, form textarea:focus {
  outline: none;
  box-shadow: 0 0 0 2px rgba(112,89,85,0.2);
}
</style>

<body class="bg-background text-on-background font-body-lg silk-gradient min-h-screen selection:bg-primary-container selection:text-on-primary-container overflow-x-hidden">
<div class="fixed inset-0 watercolor-overlay z-0"></div>
<!-- Top Navigation Bar -->
<header class="bg-rose-50/50 backdrop-blur-md fixed top-0 w-full z-50 border-b border-rose-100/30 shadow-sm shadow-rose-200/20 flex justify-between items-center px-6 py-4">
  <div class="flex items-center gap-4">
    <span class="material-symbols-outlined text-rose-300 cursor-pointer hover:opacity-80 transition-opacity duration-700">menu</span>
    <span class="text-rose-900 font-serif italic font-light text-lg tracking-widest">Evelyn &amp; James</span>
  </div>
  <div class="flex items-center gap-6">
    <nav class="hidden md:flex space-x-8 font-serif text-[10px] tracking-tighter uppercase text-rose-300/70">
      <a class="hover:text-rose-500 transition-colors" href="invitation.html">Invitation</a>
      <a class="hover:text-rose-500 transition-colors" href="our-story.html">Story</a>
      <a class="hover:text-rose-500 transition-colors" href="event-details.html">Details</a>
      <a class="hover:text-rose-500 transition-colors" href="gallery.html">Gallery</a>
    </nav>
    <span class="material-symbols-outlined text-rose-300 cursor-pointer hover:opacity-80 transition-opacity duration-700">favorite</span>
  </div>
</header>
<!-- Main Content -->
<main class="relative z-10 pt-32 pb-40 px-4 md:px-[15%] max-w-7xl mx-auto space-y-section-gap">
  <div class="absolute top-0 left-0 -z-10 opacity-10 pointer-events-none transform -translate-x-1/4">
    <svg fill="none" height="800" viewBox="0 0 600 800" width="600" xmlns="http://www.w3.org/2000/svg">
      <path d="M50 750C150 650 100 450 300 350C500 250 450 150 550 50" stroke="#705955" stroke-dasharray="2 4" stroke-width="0.5"></path>
      <circle cx="300" cy="350" opacity="0.3" r="100" stroke="#705955" stroke-width="0.5"></circle>
    </svg>
  </div>
  <!-- Hero -->
  <section class="text-center space-y-6 pt-16 md:pt-24">
    <span class="font-label-caps text-tertiary tracking-[0.3em] uppercase block bloom-reveal">We Would Love to See You There</span>
    <h1 class="font-display-lg text-primary text-5xl md:text-7xl italic bloom-reveal bloom-delay-1">RSVP</h1>
    <div class="flex items-center justify-center space-x-4 py-4 bloom-reveal bloom-delay-2">
      <div class="h-[1px] w-12 bg-tertiary-fixed-dim"></div>
      <span class="material-symbols-outlined text-tertiary-fixed-dim" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
      <div class="h-[1px] w-12 bg-tertiary-fixed-dim"></div>
    </div>
    <p class="font-body-lg text-on-surface-variant italic max-w-xl mx-auto bloom-reveal bloom-delay-3">
      Kindly respond by August 1st
    </p>
  </section>
  <!-- Countdown -->
  <div class="vows-countdown flex justify-center gap-6 bloom-reveal bloom-delay-3"></div>
  <!-- RSVP Form -->
  <section class="max-w-2xl mx-auto w-full">
    <div class="glass-card rounded-[2.5rem] p-8 md:p-12 bloom-reveal">
      <form class="space-y-6" onsubmit="event.preventDefault(); alert('Thank you! Your RSVP has been received.');">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="font-label-caps text-tertiary text-xs uppercase tracking-[0.3em] block mb-2" for="first-name">First Name</label>
            <input class="w-full px-4 py-3 rounded-xl bg-white/60 border border-rose-100 font-body-lg text-on-background text-sm" id="first-name" name="first-name" required="" type="text"/>
          </div>
          <div>
            <label class="font-label-caps text-tertiary text-xs uppercase tracking-[0.3em] block mb-2" for="last-name">Last Name</label>
            <input class="w-full px-4 py-3 rounded-xl bg-white/60 border border-rose-100 font-body-lg text-on-background text-sm" id="last-name" name="last-name" required="" type="text"/>
          </div>
        </div>
        <div>
          <label class="font-label-caps text-tertiary text-xs uppercase tracking-[0.3em] block mb-2" for="email">Email Address</label>
          <input class="w-full px-4 py-3 rounded-xl bg-white/60 border border-rose-100 font-body-lg text-on-background text-sm" id="email" name="email" required="" type="email"/>
        </div>
        <div>
          <label class="font-label-caps text-tertiary text-xs uppercase tracking-[0.3em] block mb-2" for="guests">Number of Guests</label>
          <select class="w-full px-4 py-3 rounded-xl bg-white/60 border border-rose-100 font-body-lg text-on-background text-sm" id="guests" name="guests">
            <option value="1">1 Guest</option>
            <option value="2">2 Guests</option>
            <option value="3">3 Guests</option>
            <option value="4">4 Guests</option>
          </select>
        </div>
        <div>
          <label class="font-label-caps text-tertiary text-xs uppercase tracking-[0.3em] block mb-2" for="dietary">Dietary Requirements</label>
          <textarea class="w-full px-4 py-3 rounded-xl bg-white/60 border border-rose-100 font-body-lg text-on-background text-sm" id="dietary" name="dietary" rows="3"></textarea>
        </div>
        <div>
          <label class="font-label-caps text-tertiary text-xs uppercase tracking-[0.3em] block mb-2" for="message">A Message for the Couple</label>
          <textarea class="w-full px-4 py-3 rounded-xl bg-white/60 border border-rose-100 font-body-lg text-on-background text-sm" id="message" name="message" rows="3"></textarea>
        </div>
        <button class="w-full bg-primary/80 text-white font-serif italic text-lg py-4 rounded-full hover:bg-primary transition-all duration-700 hover:scale-[1.02] shadow-lg" type="submit">
          Send RSVP
          <span class="material-symbols-outlined align-middle ml-2">mail</span>
        </button>
      </form>
    </div>
  </section>
</main>
<!-- Bottom Navigation Bar (Mobile) -->
<nav class="md:hidden fixed bottom-0 w-full z-50 bg-white/40 backdrop-blur-2xl rounded-t-[2rem] shadow-[0_-10px_40px_rgba(245,214,209,0.4)] flex justify-around items-center px-4 pb-6 pt-3">

    <span class="font-serif text-[10px] tracking-tighter uppercase mt-1">Details</span>
  </a>
  <a class="flex flex-col items-center justify-center text-rose-900 scale-110" href="#">
    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">mail</span>
    <span class="font-serif text-[10px] tracking-tighter uppercase mt-1">RSVP</span>
  </a>
</nav>
<!-- Footer -->
<footer class="flex flex-col items-center space-y-4 w-full py-12 bg-transparent relative z-10">
  <div class="h-[1px] w-24 bg-rose-100/30"></div>
  <p class="font-serif text-xs italic opacity-60 text-rose-400">With love, Evelyn and James 2024</p>
</footer>
<script src="../countdown-widget.js"></script>
<script>
(function(){
  'use strict';
  document.body.style.cssText += 'opacity:0;transform:translateY(10px);transition:opacity 0.55s ease,transform 0.55s ease;';
  requestAnimationFrame(function(){
    document.body.style.opacity = '1';
    document.body.style.transform = 'translateY(0)';
  });
  var reveals = [];
  document.querySelectorAll('section, h1, h2, h3, p.font-body-lg, .glass-card, footer').forEach(function(el, i){
    if (el.closest('header') || el.closest('nav')) return;
    el.classList.add('bloom-reveal', 'bloom-delay-' + ((i % 4) + 1));
    reveals.push(el);
  });
  var rio = new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if (e.isIntersecting) { e.target.classList.add('bloom-in'); rio.unobserve(e.target); }
    });
  }, { threshold: 0.08 });
  reveals.forEach(function(el){ rio.observe(el); });
})();
</script>
